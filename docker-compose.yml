name: youtube-etl


services:
    namenode:
        image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
        container_name: hadoop_namenode
        environment:
            - CLUSTER_NAME=master
            - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
            - HDFS_CONF_dfs_permissions_enabled=false
        ports:
            - 9870:9870
            - 9000:9000
        volumes:
            - hadoop_master_volume:/hadoop/dfs/name
        networks:
            - hadoop_project

    datanode:
        image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
        container_name: hadoop_datanode
        environment:
            - CLUSTER_NAME=slave
            - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
            - HDFS_CONF_dfs_namenode_rpc-address=namenode:9000
            - HDFS_CONF_dfs_datanode_address=datanode:9866
            - HDFS_CONF_dfs_datanode_http_address=datanode:9864
        ports:
            - 9864:9864
        volumes:
            - hadoop_slave_volumes:/hadoop/dfs/data
        networks:
            - hadoop_project
        depends_on:
            - namenode
    
    
    pyspark:
        build: .
        container_name: pyspark-app
        ports:
            - 4040:4040
            - 2222:22
        stdin_open: true 
        tty: true
        # command: bash 
        volumes:
            - .:/app
        working_dir: /app
        depends_on:
            - namenode
        env_file:
            - .env
        environment:
            - HADOOP_USER_NAME=hadoop
            - KAGGLE_USERNAME=${KAGGLE_USERNAME} 
            - KAGGLE_KEY=${KAGGLE_KEY}
            - ENVIRONMENT=${ENVIRONMENT}
        networks:
            - hadoop_project
        healthcheck:
            test: ["CMD", "nc", "-z", "localhost", "22"]
            interval: 10s
            timeout: 5s
            retries: 10

    airflow-init:
        image: apache/airflow:2.9.1
        container_name: airflow_init
        depends_on:
            - postgres
        environment:
            - AIRFLOW__CORE__EXECUTOR=LocalExecutor
            - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
            - AIRFLOW__WEBSERVER__SECRET_KEY=0c493116a66a26afe09189bd0f68a760
            - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-ssh
        volumes:
            - ./dags:/opt/airflow/dags
        entrypoint: >
            bash -c "
            airflow db migrate &&
            airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true &&
            echo 'Airflow init done'"
        networks:
            - hadoop_project
        restart: on-failure

    postgres:
        image: postgres:13
        container_name: airflow_postgres
        environment:
            POSTGRES_USER: airflow
            POSTGRES_PASSWORD: airflow
            POSTGRES_DB: airflow
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
        networks:
            - hadoop_project

    airflow-webserver:
        image: apache/airflow:2.9.1
        container_name: airflow_webserver
        depends_on:
            - airflow-init
            - postgres
        ports:
            - 8082:8080
        environment:
            - AIRFLOW__CORE__EXECUTOR=LocalExecutor
            - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
            - AIRFLOW_CONN_SSH_PYSPARK=ssh://root:root@pyspark:22
            - AIRFLOW__WEBSERVER__SECRET_KEY=0c493116a66a26afe09189bd0f68a760
            - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-ssh
        volumes:
            - ./dags:/opt/airflow/dags
        command: webserver
        networks:
            - hadoop_project
        restart: on-failure

    airflow-scheduler:
        image: apache/airflow:2.9.1
        container_name: airflow_scheduler
        depends_on:
            - airflow-webserver
        environment:
            - AIRFLOW__CORE__EXECUTOR=LocalExecutor
            - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
            - AIRFLOW_CONN_SSH_PYSPARK=ssh://root:root@pyspark:22
            - AIRFLOW__WEBSERVER__SECRET_KEY=0c493116a66a26afe09189bd0f68a760
            - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-ssh
        volumes:
            - ./dags:/opt/airflow/dags
        command: scheduler
        networks:
            - hadoop_project
        restart: on-failure

    metabase:
        image: metabase/metabase:v0.46.6
        container_name: metabase
        ports:
            - 3000:3000
        environment:
            - MB_DB_TYPE=postgres
            - MB_DB_DBNAME=metabase
            - MB_DB_PORT=5432
            - MB_DB_USER=airflow
            - MB_DB_PASS=airflow
            - MB_DB_HOST=postgres
        depends_on:
            - postgres
        networks:
            - hadoop_project
        restart: on-failure

    jenkins:
        image: jenkins/jenkins:lts
        container_name: jenkins_server
        ports:
            - 8080:8080
            - 50000:50000
        volumes:
            - jenkins_home:/var/jenkins_home
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - hadoop_project
        restart: on-failure

volumes:
    hadoop_master_volume:
    hadoop_slave_volumes:
    youtube-etl-project:
    postgres_data:
    jenkins_home:

networks:
    hadoop_project:
